<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NetSat Brasil</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #020617;
    color: white;
}

.header {
    text-align: center;
    padding: 30px;
    font-size: 28px;
    font-weight: bold;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.card {
    background: #0f172a;
    padding: 25px;
    border-radius: 20px;
    margin-bottom: 30px;
}

.valor {
    font-size: 40px;
    color: #22c55e;
}

.antigo {
    text-decoration: line-through;
    color: red;
}

.botao {
    display: block;
    background: #22c55e;
    padding: 12px;
    text-align: center;
    border-radius: 10px;
    text-decoration: none;
    color: black;
    font-weight: bold;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">NetSat Brasil 🚀</div>

<div class="container">

{% for p in paginas %}
<div class="card">

<h2>{{ p.titulo }}</h2>
<p>{{ p.subtitulo }}</p>

<div class="valor">
{{ p.valor }}
{% if p.valor_antigo %}
<span class="antigo">{{ p.valor_antigo }}</span>
{% endif %}
</div>

<ul>
{% for item in p.itens %}
<li>✔ {{ item }}</li>
{% endfor %}
</ul>

<a href="{{ p.botao }}" class="botao">Contratar</a>

</div>
{% endfor %}

</div>

</body>
</html>
