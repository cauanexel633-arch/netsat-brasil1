<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {background:#020617;color:white;font-family:Arial;margin:0}
.container {max-width:900px;margin:auto;padding:20px}
.card {background:#0f172a;padding:20px;border-radius:15px;margin-bottom:20px}
.destaque {border:2px solid #22c55e}
.numero {font-size:40px;color:#22c55e}
.botao {background:#22c55e;color:black;padding:10px;display:block;text-align:center;border-radius:10px;text-decoration:none}
</style>
</head>
<body>

<div class="container">

{% for p in paginas %}
{% set partes = p.valor.split('/') %}

<div class="card {% if p.destaque == 'sim' %}destaque{% endif %}">

<h2>{{ p.titulo }}</h2>
<p>{{ p.subtitulo }}</p>

<div class="numero">
{{ partes[0] }}
{% if partes|length > 1 %}/{{ partes[1] }}{% endif %}
</div>

<ul>
{% for item in p.itens %}
<li>{{ item }}</li>
{% endfor %}
</ul>

<a href="{{ p.botao }}" class="botao">Contratar</a>

</div>
{% endfor %}

</div>

</body>
</html>
