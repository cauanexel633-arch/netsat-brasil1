<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<!-- 🔥 RESPONSIVO -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fale Conosco</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* CONTAINER */
.container {
    background: #1e293b;
    padding: 25px;
    border-radius: 15px;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

/* TÍTULO */
h2 {
    text-align: center;
    margin-bottom: 15px;
}

/* CAMPOS */
input, textarea {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
    font-size: 1rem;
}

/* BOTÃO */
button {
    width: 100%;
    padding: 12px;
    background: #22c55e;
    border: none;
    border-radius: 8px;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}

/* VOLTAR */
.voltar {
    display: block;
    text-align: center;
    margin-top: 10px;
    color: #94a3b8;
    text-decoration: none;
}

/* MOBILE */
@media (max-width: 480px) {
    .container {
        padding: 20px;
    }
}
</style>
</head>
<body>

<div class="container">
    <h2>📩 Fale Conosco</h2>

    <form action="/contato" method="post">
        <input type="text" name="nome" placeholder="Seu nome" required>
        <textarea name="mensagem" placeholder="Digite sua mensagem" rows="4" required></textarea>
        <button type="submit">Enviar</button>
    </form>

    <a href="/" class="voltar">← Voltar ao site</a>
</div>

</body>
</html>
